{% extends "base.html" %}
{% block title %} - Login{% endblock %}

{% block content %}
<div class="auth-wrapper d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow-lg auth-card">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="bi bi-brain text-primary" style="font-size:3rem"></i>
        <h2 class="fw-bold mt-2">PsyControl</h2>
        <p class="text-muted">Gestão Psicológica</p>
      </div>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">E-mail</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" name="email" class="form-control" placeholder="seu@email.com" required/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Senha</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="••••••" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
          <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
        </button>
      </form>
      <hr class="my-4"/>
      <p class="text-center mb-0">
        Não tem conta? <a href="{{ url_for('auth.register') }}" class="text-primary fw-semibold">Cadastre-se</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
