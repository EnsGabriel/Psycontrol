{% extends "base.html" %}
{% block title %} - {% if patient %}Editar{% else %}Novo{% endif %} Paciente{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="d-flex align-items-center mb-4 gap-3">
      <a href="{{ url_for('patients.list_patients') }}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
      <h4 class="fw-bold mb-0">
        <i class="bi bi-person-{% if patient %}pencil{% else %}plus{% endif %} me-2 text-primary"></i>
        {% if patient %}Editar Paciente{% else %}Novo Paciente{% endif %}
      </h4>
    </div>
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Nome <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" placeholder="Nome completo"
                   value="{{ patient.name if patient else '' }}" required/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">CPF <span class="text-danger">*</span></label>
            <input type="text" name="cpf" class="form-control" placeholder="000.000.000-00" maxlength="14"
                   value="{{ patient.cpf if patient else '' }}" required/>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Telefone</label>
              <input type="text" name="phone" class="form-control" placeholder="(00) 00000-0000"
                     value="{{ patient.phone if patient else '' }}"/>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Data de Nascimento</label>
              <input type="date" name="birth_date" class="form-control"
                     value="{{ patient.birth_date.strftime('%Y-%m-%d') if patient and patient.birth_date else '' }}"/>
            </div>
          </div>
          <div class="d-flex gap-2 mt-2">
            <button type="submit" class="btn btn-primary px-4">
              <i class="bi bi-check-lg me-1"></i>{% if patient %}Atualizar{% else %}Salvar{% endif %}
            </button>
            <a href="{{ url_for('patients.list_patients') }}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
