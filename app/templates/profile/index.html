{% extends "base.html" %}
{% block title %} - Meu Perfil{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <h4 class="fw-bold mb-4"><i class="bi bi-person-circle me-2 text-primary"></i>Meu Perfil</h4>

    <div class="card border-0 shadow-sm mb-4">
      <div class="card-header bg-white py-3">
        <h6 class="mb-0 fw-bold">Dados Pessoais</h6>
      </div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Nome</label>
            <input type="text" name="name" class="form-control"
                   value="{{ current_user.name }}" required/>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">E-mail</label>
            <input type="email" class="form-control" value="{{ current_user.email }}" disabled/>
            <div class="form-text">O e-mail não pode ser alterado.</div>
          </div>

          <hr class="my-4"/>
          <h6 class="fw-bold mb-3">Alterar Senha <span class="text-muted fw-normal small">(opcional)</span></h6>

          <div class="mb-3">
            <label class="form-label fw-semibold">Senha Atual</label>
            <input type="password" name="current_password" class="form-control" placeholder="••••••"/>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Nova Senha <small class="text-muted">(mín. 6 caracteres)</small></label>
            <input type="password" name="new_password" class="form-control" placeholder="••••••" minlength="6"/>
          </div>

          <button type="submit" class="btn btn-primary px-4">
            <i class="bi bi-check-lg me-1"></i>Salvar Alterações
          </button>
        </form>
      </div>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <div class="d-flex align-items-center gap-3">
          <div class="avatar-lg bg-primary-soft text-primary">
            <i class="bi bi-person-fill fs-2"></i>
          </div>
          <div>
            <div class="fw-bold fs-5">{{ current_user.name }}</div>
            <div class="text-muted small">{{ current_user.email }}</div>
            <span class="badge bg-primary-soft text-primary mt-1">Psicólogo</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
